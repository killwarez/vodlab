name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: vodlab-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - windows
    steps:
      - name: Run fixed deploy script
        shell: pwsh
        env:
          DEPLOY_SCRIPT_PATH: ${{ secrets.DEPLOY_SCRIPT_PATH }}
        run: |
          if (-not $env:DEPLOY_SCRIPT_PATH) {
            throw "Missing DEPLOY_SCRIPT_PATH secret."
          }

          & $env:DEPLOY_SCRIPT_PATH
